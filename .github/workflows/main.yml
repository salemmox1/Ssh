name: Setup SSH Runner Debug Mode

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup-ssh-runner:
    runs-on: ubuntu-latest
    env:
      REMOTE_HOST: 109.122.18.29
      REMOTE_USER: me2008
      LOCAL_USER: runner
      LOCAL_PASS: runner
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure Local User
        run: |
          echo "${LOCAL_USER}:${LOCAL_PASS}" | sudo chpasswd
          echo "${LOCAL_USER} ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/${LOCAL_USER}

      - name: Install SSH Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server autossh
          sudo systemctl enable ssh
          sudo systemctl start ssh

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${REMOTE_HOST} >> ~/.ssh/known_hosts

      - name: Test Connection and Establish Tunnel
        run: |
          echo ">>> Testing SSH Auth..."
          ssh -o BatchMode=yes -o ConnectTimeout=10 ${REMOTE_USER}@${REMOTE_HOST} "echo 'AUTH_SUCCESS'" || (echo "AUTH_FAILED: Check your Private Key in Secrets and authorized_keys on Server" && exit 1)
          
          echo ">>> Establishing Reverse Tunnel on Port 224..."
          autossh -fN -M 0 \
            -o "ServerAliveInterval 30" \
            -o "ServerAliveCountMax 3" \
            -o "StrictHostKeyChecking=no" \
            -R 224:localhost:22 ${REMOTE_USER}@${REMOTE_HOST}
            
          echo ">>> Tunnel requested. Checking if local port 22 is active..."
          sudo netstat -tulpn | grep :22
          
          echo "=== CONNECTION READY ==="
          echo "Run this on your PC: ssh ${LOCAL_USER}@${REMOTE_HOST} -p 224"
          
          tail -f /dev/null
